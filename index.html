<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ドリンク券管理</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --pop-pink: #FF6B9D;
      --pop-pink-light: #FFE0EE;
      --pop-pink-dark: #C0396B;
      --pop-purple: #A78BFA;
      --pop-purple-light: #EDE9FE;
      --pop-purple-dark: #6D28D9;
      --pop-teal: #34D399;
      --pop-teal-light: #D1FAE5;
      --pop-teal-dark: #065F46;
      --pop-orange: #FB923C;
      --pop-orange-light: #FFEDD5;
      --pop-orange-dark: #9A3412;
      --pop-yellow: #FBBF24;
      --pop-yellow-light: #FEF3C7;
      --pop-sky: #38BDF8;
      --pop-sky-light: #E0F2FE;
      --pop-sky-dark: #0369A1;

      --text-primary: #1a1a2e;
      --text-secondary: #4a4a6a;
      --text-muted: #9090b0;
      --surface-1: #FFF0F5;
      --surface-2: #FFF8FB;
      --border: #F8D0E4;
      --border-strong: #F0A0C8;
      --radius-sm: 12px;
      --radius-md: 18px;
      --radius-lg: 24px;
      --radius-pill: 999px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --text-primary: #F0EEFF;
        --text-secondary: #B8B0D8;
        --text-muted: #6860A0;
        --surface-1: #1A1630;
        --surface-2: #24203E;
        --border: #322C54;
        --border-strong: #4A4080;
      }
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--surface-1);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .page { padding: 14px; max-width: 1200px; margin: 0 auto; }

    /* ヘッダーロゴ風アクセント */
    .app-header {
      text-align: center;
      margin-bottom: 16px;
      padding-top: 4px;
    }
    .app-header-title {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(90deg, var(--pop-pink), var(--pop-pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.02em;
    }

    .section-title { font-size: 11px; color: var(--text-muted); font-weight: 600; margin: 0 0 10px; letter-spacing: 0.08em; text-transform: uppercase; }

    /* カード */
    .card {
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.1rem 1.1rem;
      margin-bottom: 14px;
      box-shadow: 0 2px 12px rgba(167,139,250,0.07);
    }

    /* タブ */
    .tabs { display: flex; gap: 6px; margin-bottom: 14px; background: var(--surface-2); border-radius: var(--radius-pill); padding: 5px; border: 1.5px solid var(--border); }
    .tab { flex: 1; padding: 9px 0; font-size: 12px; border: none; border-radius: var(--radius-pill); background: none; color: var(--text-secondary); cursor: pointer; text-align: center; font-weight: 500; transition: background 0.18s, color 0.18s; }
    .tab.active { background: linear-gradient(135deg, var(--pop-pink), var(--pop-pink)); color: #fff; font-weight: 700; box-shadow: 0 2px 8px rgba(167,139,250,0.35); }

    /* 検索 */
    .search-wrap { display: flex; gap: 8px; margin-bottom: 12px; }
    .search-input { flex: 1; height: 44px; border: 1.5px solid var(--border); border-radius: var(--radius-pill); padding: 0 16px; font-size: 16px; background: var(--surface-2); color: var(--text-primary); outline: none; }
    .search-input:focus { border-color: var(--pop-pink); box-shadow: 0 0 0 3px var(--pop-pink-light); }
    .search-btn { height: 44px; padding: 0 18px; border: none; border-radius: var(--radius-pill); background: linear-gradient(135deg, var(--pop-pink), var(--pop-pink)); color: #fff; cursor: pointer; font-size: 14px; font-weight: 600; box-shadow: 0 2px 8px rgba(167,139,250,0.3); white-space: nowrap; }
    .search-clear { height: 44px; padding: 0 14px; border: 1.5px solid var(--border); border-radius: var(--radius-pill); background: none; color: var(--text-secondary); cursor: pointer; font-size: 14px; }
    .search-hint { font-size: 13px; color: var(--text-muted); text-align: center; padding: 2rem 0 1rem; }

    /* 顧客カード */
    .customer-list { display: flex; flex-direction: column; gap: 10px; }
    .customer-item { background: var(--surface-2); border: 1.5px solid var(--border); border-radius: var(--radius-md); padding: 14px 14px; }
    .customer-item-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .customer-name { font-size: 16px; font-weight: 600; color: var(--text-primary); }
    .tickets-badge { font-size: 11px; background: var(--pop-pink-light); color: var(--pop-pink-dark); border-radius: var(--radius-pill); padding: 3px 9px; margin-left: 6px; font-weight: 600; }
    .balance-display { font-size: 16px; font-weight: 700; color: var(--pop-pink-dark); }
    .balance-display.low { color: var(--pop-orange-dark); }
    .balance-display.empty { color: var(--text-muted); }

    @media (prefers-color-scheme: dark) {
      .balance-display { color: var(--pop-pink); }
      .balance-display.low { color: var(--pop-orange); }
      .tickets-badge { background: #0D3B2A; color: var(--pop-pink); }
    }

    .customer-item-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .ticket-nums { font-size: 12px; color: var(--text-secondary); background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 5px 10px; margin-bottom: 10px; font-weight: 500; word-break: break-all; }

    /* ボタン共通 */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 4px; border-radius: var(--radius-pill); cursor: pointer; font-size: 13px; padding: 8px 14px; border: 1.5px solid var(--border); background: none; color: var(--text-primary); white-space: nowrap; min-height: 38px; font-weight: 500; transition: transform 0.1s, box-shadow 0.1s; }
    .btn:active { transform: scale(0.95); }
    .btn-order { border: none; background: linear-gradient(135deg, var(--pop-pink), var(--pop-pink)); color: #fff; flex: 1; font-size: 14px; font-weight: 700; box-shadow: 0 2px 8px rgba(56,189,248,0.3); }
    .btn-ticket { border-color: var(--pop-pink); background: var(--pop-pink-light); color: var(--pop-pink-dark); font-weight: 600; }
    .btn-edit { border-color: var(--border-strong); color: var(--text-secondary); }
    .btn-delete { border-color: #FCA5A5; background: #FFF5F5; color: #DC2626; font-weight: 600; }
    .btn-reset { border-color: var(--pop-orange); background: var(--pop-orange-light); color: var(--pop-orange-dark); font-weight: 600; }

    @media (prefers-color-scheme: dark) {
      .btn-ticket { background: #0D3B2A; color: var(--pop-pink); }
      .btn-delete { background: #3B1515; color: #F87171; border-color: #7A2020; }
      .btn-reset { background: #3B1E0D; color: var(--pop-orange); }
    }

    /* 残高編集 */
    .edit-row { display: flex; gap: 8px; align-items: center; margin-top: 12px; padding-top: 12px; border-top: 1.5px dashed var(--border); }
    .edit-bal-select { flex: 1; height: 44px; border: 1.5px solid var(--pop-pink); border-radius: var(--radius-pill); padding: 0 14px; font-size: 16px; background: var(--surface-2); color: var(--text-primary); outline: none; }
    .btn-save { height: 44px; padding: 0 18px; border: none; border-radius: var(--radius-pill); background: linear-gradient(135deg, var(--pop-pink), var(--pop-pink)); color: #fff; cursor: pointer; font-size: 14px; font-weight: 700; white-space: nowrap; }

    /* 新規追加フォーム */
    /* 検索画面ラッパー（PCで中央配置するためのフック） */
    .search-screen { width: 100%; }

    .add-form { display: flex; flex-direction: column; gap: 10px; }
    .add-form input[type=text], .add-form input[type=number] { width: 100%; height: 48px; border: 1.5px solid var(--border); border-radius: var(--radius-pill); padding: 0 18px; font-size: 16px; background: var(--surface-2); color: var(--text-primary); outline: none; }
    .add-form input[type=text]:focus, .add-form input[type=number]:focus { border-color: var(--pop-pink); box-shadow: 0 0 0 3px var(--pop-pink-light); }
    .btn-add { width: 100%; height: 48px; font-size: 15px; font-weight: 700; border: none; border-radius: var(--radius-pill); background: linear-gradient(135deg, var(--pop-pink), var(--pop-pink)); color: #fff; cursor: pointer; box-shadow: 0 2px 10px rgba(52,211,153,0.3); }

    /* 注文画面 */
    .back-btn { font-size: 14px; color: var(--pop-pink-dark); background: var(--pop-pink-light); border: none; cursor: pointer; padding: 8px 16px; margin-bottom: 14px; display: inline-flex; align-items: center; gap: 4px; min-height: 36px; border-radius: var(--radius-pill); font-weight: 600; }
    @media (prefers-color-scheme: dark) { .back-btn { color: var(--pop-pink); background: #1E1840; } }

    .balance-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
    .bal-big { font-size: 26px; font-weight: 800; color: var(--pop-pink-dark); white-space: nowrap; }
    .bal-big.low { color: var(--pop-orange-dark); }
    @media (prefers-color-scheme: dark) { .bal-big { color: var(--pop-pink); } .bal-big.low { color: var(--pop-orange); } }
    .prog-bg { flex: 1; background: var(--surface-1); border-radius: 99px; height: 10px; overflow: hidden; border: 1px solid var(--border); }
    .prog-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--pop-pink), var(--pop-pink)); transition: width 0.3s; }
    .prog-fill.low { background: linear-gradient(90deg, var(--pop-orange), var(--pop-pink)); }

    /* ドリンクメニュー */
    .drink-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 1rem; }
    .drink-card { background: var(--surface-1); border: 1.5px solid var(--border); border-radius: var(--radius-md); padding: 14px 10px; cursor: pointer; text-align: center; user-select: none; transition: transform 0.12s, box-shadow 0.12s; }
    .drink-card:active { transform: scale(0.94); box-shadow: 0 4px 16px rgba(167,139,250,0.2); border-color: var(--pop-pink); }
    .drink-card.disabled { opacity: 0.3; pointer-events: none; }
    .drink-name { font-size: 15px; font-weight: 700; color: var(--text-primary); margin: 0 0 4px; }
    .drink-price { font-size: 13px; color: var(--text-secondary); margin: 0 0 8px; font-weight: 500; }
    .drink-count { display: inline-block; background: linear-gradient(135deg, var(--pop-pink-light), var(--pop-pink-light)); color: var(--pop-pink-dark); font-size: 12px; font-weight: 700; border-radius: var(--radius-pill); padding: 3px 12px; min-width: 30px; }
    @media (prefers-color-scheme: dark) { .drink-count { background: #2A1E4A; color: var(--pop-pink); } }

    /* アラート */
    .alert { background: var(--pop-orange-light); border: 1.5px solid var(--pop-orange); color: var(--pop-orange-dark); border-radius: var(--radius-md); padding: 10px 14px; font-size: 14px; margin-bottom: 10px; display: none; font-weight: 600; }

    /* 注文履歴 */
    .order-row { display: flex; justify-content: space-between; font-size: 14px; padding: 8px 0; border-bottom: 1.5px dashed var(--border); color: var(--text-primary); }
    .order-row:last-child { border-bottom: none; }
    .undo-btn { font-size: 13px; color: var(--pop-pink-dark); background: none; border: none; cursor: pointer; padding: 0; font-weight: 600; min-height: 36px; }
    @media (prefers-color-scheme: dark) { .undo-btn { color: var(--pop-pink); } }

    /* 来店履歴 */
    .history-session { background: var(--surface-1); border-radius: var(--radius-md); padding: 12px 14px; margin-bottom: 8px; border: 1.5px solid var(--border); }
    .history-date { font-size: 12px; color: var(--text-muted); margin: 0 0 4px; font-weight: 600; }
    .history-items { font-size: 13px; color: var(--text-primary); margin: 0 0 4px; }
    .history-total { font-size: 13px; font-weight: 700; color: var(--pop-pink-dark); margin: 0; }
    @media (prefers-color-scheme: dark) { .history-total { color: var(--pop-pink); } }

    /* メニュー管理 */
    .menu-item-row { display: flex; align-items: center; gap: 8px; padding: 12px 0; border-bottom: 1.5px dashed var(--border); }
    .menu-item-row:last-child { border-bottom: none; }
    .menu-item-name { flex: 1; font-size: 15px; color: var(--text-primary); font-weight: 600; }
    .menu-sort-actions { display: flex; gap: 3px; }
    .btn-sort { width: 34px; height: 38px; padding: 0; display: inline-flex; align-items: center; justify-content: center; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--surface-1); color: var(--text-secondary); cursor: pointer; font-size: 12px; }
    .btn-sort:disabled { opacity: 0.2; cursor: not-allowed; }
    .menu-price-edit-wrap { display: flex; align-items: center; background: var(--surface-1); border: 1.5px solid var(--border); border-radius: var(--radius-pill); padding: 0 10px; height: 40px; }
    .menu-price-edit-input { width: 65px; border: none; background: transparent; text-align: right; font-size: 15px; font-weight: 700; color: var(--text-primary); padding: 0; outline: none; }
    .menu-price-edit-unit { font-size: 13px; color: var(--text-secondary); margin-left: 2px; font-weight: 500; }
    .btn-menu-delete { padding: 6px 12px; border: 1.5px solid #FCA5A5; border-radius: var(--radius-pill); background: #FFF5F5; color: #DC2626; cursor: pointer; font-size: 14px; min-height: 38px; font-weight: 600; }
    @media (prefers-color-scheme: dark) { .btn-menu-delete { background: #3B1515; color: #F87171; border-color: #7A2020; } }

    /* メニュー追加フォーム */
    .menu-add-form { display: flex; flex-direction: column; gap: 10px; }
    .menu-manage-layout { display: block; }
    .menu-add-inputs { display: flex; gap: 8px; }
    .inp-name { flex: 1; min-width: 100px; height: 44px; border: 1.5px solid var(--border); border-radius: var(--radius-pill); padding: 0 14px; font-size: 15px; background: var(--surface-2); color: var(--text-primary); outline: none; }
    .inp-price { width: 90px; height: 44px; border: 1.5px solid var(--border); border-radius: var(--radius-pill); padding: 0 14px; font-size: 15px; background: var(--surface-2); color: var(--text-primary); outline: none; }
    .inp-name:focus, .inp-price:focus { border-color: var(--pop-pink); }
    .menu-add-options { display: flex; gap: 14px; padding: 4px 2px; font-size: 14px; color: var(--text-secondary); flex-wrap: wrap; }
    .menu-add-options label { display: inline-flex; align-items: center; gap: 5px; cursor: pointer; font-weight: 500; }
    .menu-add-options input[type="checkbox"] { width: 17px; height: 17px; cursor: pointer; accent-color: var(--pop-pink); }
    .btn-menu-add { height: 44px; width: 100%; border: none; border-radius: var(--radius-pill); background: linear-gradient(135deg, var(--pop-pink), var(--pop-pink)); color: #fff; cursor: pointer; font-size: 14px; font-weight: 700; box-shadow: 0 2px 8px rgba(167,139,250,0.3); }

    /* 確認ダイアログ */
    .confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(26,22,50,0.45); align-items: flex-end; justify-content: center; z-index: 100; }
    .confirm-overlay.show { display: flex; }
    .confirm-box { background: var(--surface-2); border-radius: var(--radius-lg) var(--radius-lg) 0 0; padding: 1.5rem 1.25rem 2rem; width: 100%; max-width: 520px; border-top: 3px solid; border-image: linear-gradient(90deg, var(--pop-pink), var(--pop-pink)) 1; }
    .confirm-box p { font-size: 16px; color: var(--text-primary); margin: 0 0 1.25rem; white-space: pre-wrap; font-weight: 500; }
    .confirm-actions { display: flex; flex-direction: column; gap: 8px; }
    .confirm-cancel { width: 100%; padding: 13px; font-size: 15px; border: 1.5px solid var(--border-strong); border-radius: var(--radius-pill); background: none; color: var(--text-secondary); cursor: pointer; font-weight: 600; }
    .confirm-ok { width: 100%; padding: 13px; font-size: 15px; border: none; border-radius: var(--radius-pill); background: linear-gradient(135deg, var(--pop-pink), #E53E3E); color: #fff; cursor: pointer; font-weight: 700; box-shadow: 0 2px 8px rgba(255,107,157,0.35); }

    /* トースト */
    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: var(--surface-2); border: 1.5px solid var(--border-strong); border-radius: var(--radius-pill); padding: 11px 22px; font-size: 14px; color: var(--text-primary); display: none; white-space: nowrap; z-index: 99; box-shadow: 0 4px 20px rgba(167,139,250,0.2); font-weight: 600; }

    /* ドリンクオプション ポップアップ */
    .drink-popup-overlay { display: none; position: fixed; inset: 0; background: rgba(26,22,50,0.5); align-items: flex-end; justify-content: center; z-index: 110; }
    .drink-popup-overlay.show { display: flex; }
    .drink-popup { background: var(--surface-2); border-radius: var(--radius-lg) var(--radius-lg) 0 0; padding: 1.5rem 1.25rem 2.5rem; width: 100%; max-width: 520px; border-top: 3px solid; border-image: linear-gradient(90deg, var(--pop-pink), var(--pop-pink)) 1; }
    .drink-popup-title { font-size: 20px; font-weight: 800; color: var(--text-primary); margin: 0 0 4px; text-align: center; }
    .drink-popup-base-price { font-size: 13px; color: var(--text-muted); text-align: center; margin: 0 0 20px; font-weight: 500; }
    .popup-section-label { font-size: 11px; color: var(--text-muted); font-weight: 700; margin: 0 0 9px; letter-spacing: 0.08em; text-transform: uppercase; }
    .popup-option-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .popup-option-btn { flex: 1; padding: 12px 8px; border: 1.5px solid var(--border); border-radius: var(--radius-md); background: var(--surface-1); color: var(--text-primary); font-size: 15px; cursor: pointer; text-align: center; transition: border-color 0.15s, background 0.15s; }
    .popup-option-btn .opt-label { display: block; font-weight: 700; }
    .popup-option-btn .opt-price { display: block; font-size: 12px; color: var(--text-muted); margin-top: 2px; font-weight: 500; }
    .popup-option-btn.selected { border-color: var(--pop-pink); background: var(--pop-pink-light); color: var(--pop-pink-dark); box-shadow: 0 2px 8px rgba(167,139,250,0.25); }
    .popup-option-btn.selected .opt-price { color: var(--pop-pink-dark); }
    .popup-option-btn.hot.selected { border-color: var(--pop-orange); background: var(--pop-orange-light); color: var(--pop-orange-dark); }
    .popup-option-btn.ice.selected { border-color: var(--pop-pink); background: var(--pop-pink-light); color: var(--pop-pink-dark); }
    @media (prefers-color-scheme: dark) {
      .popup-option-btn.selected { background: #2A1E4A; color: var(--pop-pink); }
      .popup-option-btn.selected .opt-price { color: var(--pop-pink); }
      .popup-option-btn.hot.selected { background: #3B1E0D; color: var(--pop-orange); }
      .popup-option-btn.ice.selected { background: #0D2B3B; color: var(--pop-pink); }
    }
    .popup-total-price { font-size: 26px; font-weight: 800; color: var(--pop-pink-dark); text-align: center; margin: 6px 0 18px; }
    @media (prefers-color-scheme: dark) { .popup-total-price { color: var(--pop-pink); } }
    .popup-actions { display: flex; gap: 8px; }
    .popup-cancel-btn { flex: 1; padding: 13px; font-size: 15px; border: 1.5px solid var(--border-strong); border-radius: var(--radius-pill); background: none; color: var(--text-secondary); cursor: pointer; font-weight: 600; }
    .popup-order-btn { flex: 2; padding: 13px; font-size: 15px; border: none; border-radius: var(--radius-pill); background: linear-gradient(135deg, var(--pop-pink), var(--pop-pink)); color: #fff; cursor: pointer; font-weight: 700; box-shadow: 0 2px 10px rgba(56,189,248,0.3); }
    /* ━━━ PC専用レイアウト (900px以上) ━━━ */
    @media (min-width: 900px) {
      .page { padding: 28px 40px; }

      /* ヘッダー */
      .app-header { text-align: left; display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
      .app-header-title { font-size: 24px; }

      /* タブバー */
      .tabs { max-width: 560px; }
      .tab { font-size: 13px; padding: 9px 0; }

      /* 顧客一覧：2列グリッド */
      .customer-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }

      /* ホバー・マウス操作対応 */
      .btn:hover { opacity: 0.82; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(167,139,250,0.2); }
      .btn:active { transform: scale(0.97); }
      .btn-order:hover { box-shadow: 0 4px 16px rgba(255,107,157,0.45); }
      .drink-card:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(167,139,250,0.18); border-color: var(--pop-pink); }
      .drink-card:active { transform: scale(0.96); }
      .customer-item { transition: box-shadow 0.15s, transform 0.15s; }
      .customer-item:hover { box-shadow: 0 4px 16px rgba(167,139,250,0.12); transform: translateY(-1px); }

      /* 注文画面：左サイドバー＋右メインの2カラム */
      .pc-order-layout { display: grid; grid-template-columns: 280px 1fr; gap: 20px; align-items: start; }
      .pc-sidebar { position: sticky; top: 20px; }
      .pc-sidebar-title { font-size: 11px; color: var(--text-muted); font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin: 0 0 10px; }
      .pc-sidebar-list { display: flex; flex-direction: column; gap: 6px; max-height: calc(100vh - 160px); overflow-y: auto; }
      .pc-sidebar-item { padding: 10px 14px; border-radius: var(--radius-md); border: 1.5px solid var(--border); background: var(--surface-2); cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-primary); transition: background 0.15s, border-color 0.15s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .pc-sidebar-item:hover { background: var(--pop-pink-light); border-color: var(--pop-pink); }
      .pc-sidebar-item.active { background: var(--pop-pink-light); border-color: var(--pop-pink); color: var(--pop-pink-dark); font-weight: 700; }
      @media (prefers-color-scheme: dark) {
        .pc-sidebar-item:hover, .pc-sidebar-item.active { background: #2A1E4A; border-color: var(--pop-pink); color: var(--pop-pink); }
      }

      /* ドリンクグリッド：4列 */
      .drink-grid { grid-template-columns: repeat(4, 1fr); }

      /* ダイアログ・ポップアップ：PC中央表示 */
      .confirm-overlay { align-items: center; }
      .confirm-box { border-radius: var(--radius-lg); border-top: none; border: 2px solid var(--pop-pink); box-shadow: 0 8px 40px rgba(167,139,250,0.25); }
      .confirm-actions { flex-direction: row-reverse; gap: 10px; }
      .confirm-ok, .confirm-cancel { flex: 1; }

      .drink-popup-overlay { align-items: center; }
      .drink-popup { border-radius: var(--radius-lg); border-top: none; border: 2px solid var(--pop-pink); box-shadow: 0 8px 40px rgba(167,139,250,0.25); }

      /* 検索バーの幅を制限 */
      .search-wrap { max-width: 560px; }

      /* 顧客検索画面：検索前（ヒント表示中）は画面中央に配置 */
      .search-screen:has(.search-hint) {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 55vh;
        text-align: center;
      }
      .search-screen:has(.search-hint) .search-wrap {
        width: 100%;
        max-width: 480px;
        margin: 0 0 4px;
      }
      .search-screen:has(.search-hint) .search-hint { padding: 1.5rem 0 0; }

      /* メニュー管理タブ：現在のメニュー（左）／新規追加（右）の2カラム */
      .menu-manage-layout { display: grid; grid-template-columns: 1.2fr 1fr; gap: 16px; align-items: start; }
      .menu-manage-layout .card { margin-bottom: 0; }

      /* ボタンサイズを少し引き締め */
      .btn { padding: 7px 13px; min-height: 34px; font-size: 13px; }
      .btn-order { font-size: 14px; }
      .search-input { height: 40px; font-size: 14px; }
      .search-btn, .search-clear { height: 40px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="app-header">
      <div class="app-header-title">🍹 ドリンク券管理</div>
    </div>
    <div id="app"></div>
    <div class="confirm-overlay" id="confirm-overlay">
      <div class="confirm-box">
        <p id="confirm-msg"></p>
        <div class="confirm-actions">
          <button class="confirm-ok" id="confirm-ok">実行する</button>
          <button class="confirm-cancel" id="confirm-cancel">キャンセル</button>
        </div>
      </div>
    </div>
    <div class="toast" id="toast"></div>

    <div class="drink-popup-overlay" id="drink-popup-overlay">
      <div class="drink-popup">
        <p class="drink-popup-title" id="popup-drink-name"></p>
        <p class="drink-popup-base-price" id="popup-drink-base-price"></p>
        <div id="popup-size-section">
          <p class="popup-section-label">サイズ</p>
          <div class="popup-option-row" id="popup-size-row"></div>
        </div>
        <div id="popup-temp-section">
          <p class="popup-section-label">温度</p>
          <div class="popup-option-row" id="popup-temp-row"></div>
        </div>
        <p class="popup-total-price" id="popup-total-price"></p>
        <div class="popup-actions">
          <button class="popup-cancel-btn" id="popup-cancel-btn">キャンセル</button>
          <button class="popup-order-btn" id="popup-order-btn">注文する</button>
        </div>
      </div>
    </div>

    <div class="drink-popup-overlay" id="ticket-manage-overlay">
      <div class="drink-popup">
        <p class="drink-popup-title" id="ticket-manage-name"></p>
        <p class="drink-popup-base-price">所持しているチケット№の確認・削除・開始番号の変更ができます</p>
        <div id="ticket-manage-list" style="display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 18px;"></div>
        <p class="popup-section-label">開始番号を変更してリナンバー</p>
        <div class="popup-option-row" style="align-items:center;">
          <input type="number" id="ticket-renumber-start" min="1" value="1" style="flex:1;height:44px;border:1.5px solid var(--border);border-radius:var(--radius-pill);padding:0 14px;font-size:16px;background:var(--surface-1);color:var(--text-primary);outline:none;" />
          <button class="popup-order-btn" id="ticket-renumber-btn" style="flex:1;">適用</button>
        </div>
        <div class="popup-actions">
          <button class="popup-cancel-btn" id="ticket-manage-close-btn">閉じる</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'drink-ticket-app-v1';
    const DEFAULT_MENU = [
      { id: 1,  name: 'ビール',         price: 600, sizes: [], temps: [] },
      { id: 2,  name: '生ビール',       price: 700, sizes: [{label:'S',priceDiff:0},{label:'L',priceDiff:100}], temps: [] },
      { id: 3,  name: 'ハイボール',     price: 500, sizes: [{label:'S',priceDiff:0},{label:'L',priceDiff:100}], temps: [] },
      { id: 4,  name: '酎ハイ',         price: 500, sizes: [{label:'S',priceDiff:0},{label:'L',priceDiff:100}], temps: [] },
      { id: 5,  name: '日本酒',         price: 600, sizes: [], temps: [] },
      { id: 6,  name: 'ワイン',         price: 550, sizes: [], temps: [] },
      { id: 7,  name: 'ウーロン茶',     price: 350, sizes: [{label:'S',priceDiff:0},{label:'L',priceDiff:100}], temps: ['HOT','ICE'] },
      { id: 8,  name: 'コーラ',         price: 350, sizes: [{label:'S',priceDiff:0},{label:'L',priceDiff:100}], temps: [] },
      { id: 9,  name: 'オレンジジュース', price: 400, sizes: [{label:'S',priceDiff:0},{label:'L',priceDiff:100}], temps: [] },
      { id: 10, name: 'ノンアル',       price: 400, sizes: [{label:'S',priceDiff:0},{label:'L',priceDiff:100}], temps: ['HOT','ICE'] },
    ];

    const INITIAL_NAMES = [
      'お客様01','お客様02','お客様03','お客様04','お客様05','お客様06',
      'お客様07','お客様08','お客様09','お客様10','お客様11','お客様12',
      'お客様13','お客様14','お客様15','お客様16','お客様17','お客様18',
      'お客様19','お客様20','お客様21','お客様22','お客様23','お客様24',
      'お客様25','お客様26','お客様27','お客様28','お客様29','お客様30',
      'お客様31','お客様32','お客様33','お客様34','お客様35','お客様36',
      'お客様37','お客様38','お客様39','お客様40','お客様41'
    ];

    const DEFAULT_CUSTOMERS = INITIAL_NAMES.map((name, i) => ({
      id: i + 1, name, balance: 1200, tickets: 1, ticketNumbers: [1], orders: [], sessions: [], editing: false
    }));

    const BALANCE_OPTIONS = Array.from({ length: 121 }, (_, i) => i * 50);

    function saveData() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          customers: customers.map(c => ({ ...c, editing: false })),
          menu, nextId, nextMenuId
        }));
      } catch(e) {}
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return false;
        const data = JSON.parse(raw);
        if (data.customers) customers = data.customers.map(c => ({
          ticketNumbers: Array.from({ length: c.tickets || 1 }, (_, i) => i + 1),
          ...c
        }));
        if (data.menu) menu = data.menu.map(m => ({ sizes: [], temps: [], ...m }));
        if (data.nextId) nextId = data.nextId;
        if (data.nextMenuId) nextMenuId = data.nextMenuId;
        return true;
      } catch(e) { return false; }
    }

    let menu = DEFAULT_MENU.slice();
    let nextMenuId = 11;
    let customers = DEFAULT_CUSTOMERS.map(c => ({ ...c }));
    let nextId = customers.length + 1;
    loadData();

    let view = 'list', selectedId = null, tab = 'list', searchQuery = '', searchDone = false, confirmCallback = null;
    let historyFrom = '', historyTo = ''; // 履歴タブの日付絞り込み（from/to）。タブを行き来しても値は保持される。
    let lastBackupAt = localStorage.getItem(STORAGE_KEY + '-last-backup') || ''; // 最終バックアップ日時（ページ再読込しても保持）
    let popupItemId = null, popupSelectedSize = null, popupSelectedTemp = null;
    let manageTicketsId = null;

    // ── 早朝5時リセット（営業日）ロジック ──────────────────────────
    // 当日午前5時を基準に「営業日」を判定する。
    // 5時以降 → 営業日は本日の日付
    // 5時より前 → 営業日は前日の日付（深夜営業の延長とみなす）
    // この判定は来店履歴の「表示」だけに使用し、残高計算には一切影響させない。
    function getBusinessDateKey(d) {
      const dt = new Date(d);
      if (dt.getHours() < 5) dt.setDate(dt.getDate() - 1);
      return `${dt.getFullYear()}-${dt.getMonth()+1}-${dt.getDate()}`;
    }
    const CURRENT_BUSINESS_DATE = getBusinessDateKey(new Date());

    function getCustomer(id) { return customers.find(c => c.id === id); }

    // ── 履歴タブ用ヘルパー ──────────────────────────
    // 全顧客のsessions（来店履歴）を1つの配列にまとめ、新しい順に並べる。
    // customers配列やsessions自体は変更しない（読み取り専用）。
    function getAllSessions() {
      const all = [];
      customers.forEach(c => {
        (c.sessions || []).forEach((s, idx) => {
          all.push({ ...s, customerName: c.name, customerId: c.id, sessionIdx: idx });
        });
      });
      return all.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
    }

    function timestampToDateInputValue(ts) {
      const d = new Date(ts);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    // 日付（from/to）でセッション一覧を絞り込む。timestampを持たない旧データは
    // 絞り込み条件が指定されていない場合のみ表示する。
    function filterSessionsByDate(sessions, from, to) {
      if (!from && !to) return sessions;
      return sessions.filter(s => {
        if (!s.timestamp) return false;
        const dateStr = timestampToDateInputValue(s.timestamp);
        if (from && dateStr < from) return false;
        if (to && dateStr > to) return false;
        return true;
      });
    }

    function nowStr() {
      const d = new Date();
      return `${d.getMonth()+1}月${d.getDate()}日 ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.style.display = 'block';
      setTimeout(() => { t.style.display = 'none'; }, 2500);
    }

    function showConfirm(msg, okLabel, cb) {
      document.getElementById('confirm-msg').textContent = msg;
      document.getElementById('confirm-ok').textContent = okLabel || '実行する';
      document.getElementById('confirm-overlay').classList.add('show');
      confirmCallback = cb;
    }

    function renderCustomerList() {
      const container = document.getElementById('customer-list-container');
      if (!container) return;
      if (!searchDone) {
        container.innerHTML = '<p class="search-hint">🔍 上の検索欄から名前を入力して<br>お客様を呼び出してください</p>';
        return;
      }
      const q = searchQuery.replace(/\s/g,'');
      const filtered = q ? customers.filter(c => c.name.replace(/\s/g,'').includes(q)) : [];
      container.innerHTML = filtered.length
        ? filtered.map(c => customerItemHTML(c)).join('')
        : '<p style="color:var(--text-muted);text-align:center;padding:1rem 0;">該当なし</p>';
      attachCustomerEvents();
    }

    function customerItemHTML(c) {
      const low = c.balance > 0 && c.balance < 400;
      const empty = c.balance === 0;
      const balClass = empty ? 'empty' : low ? 'low' : '';
      const ticketBadge = c.tickets > 1 ? `<span class="tickets-badge">${c.tickets}枚</span>` : '';
      const nums = (c.ticketNumbers || []).slice().sort((a,b) => a-b);
      const ticketNumsLine = nums.length
        ? `<div class="ticket-nums">№：${nums.join(', ')}</div>`
        : '';
      const editRow = c.editing ? `
        <div class="edit-row">
          <select class="edit-bal-select" data-id="${c.id}">
            ${BALANCE_OPTIONS.map(v => `<option value="${v}"${v === Math.round(c.balance/50)*50?' selected':''}>¥${v.toLocaleString()}</option>`).join('')}
          </select>
          <button class="btn-save" data-save="${c.id}">保存</button>
        </div>` : '';
      return `<div class="customer-item">
        <div class="customer-item-top">
          <span class="customer-name">${c.name}${ticketBadge}</span>
          <span class="balance-display ${balClass}">¥${c.balance.toLocaleString()}</span>
        </div>
        ${ticketNumsLine}
        <div class="customer-item-actions">
          <button class="btn btn-order" data-order="${c.id}">🍹 注文</button>
          <button class="btn btn-ticket" data-addticket="${c.id}">+1枚</button>
          <button class="btn btn-edit" data-manage-tickets="${c.id}">🎫</button>
          <button class="btn btn-edit" data-edit="${c.id}">✏️</button>
          <button class="btn btn-reset" data-reset="${c.id}">🔄</button>
          <button class="btn btn-delete" data-delete="${c.id}">🗑</button>
        </div>
        ${editRow}
      </div>`;
    }

    function openDrinkPopup(itemId) {
      const item = menu.find(m => m.id === itemId);
      if (!item) return;
      popupItemId = itemId;
      const sizes = item.sizes || [], temps = item.temps || [];
      popupSelectedSize = sizes.length > 0 ? 0 : null;
      popupSelectedTemp = temps.length > 0 ? temps[0] : null;
      document.getElementById('popup-drink-name').textContent = item.name;
      document.getElementById('popup-drink-base-price').textContent = sizes.length > 0 ? `基本価格 ¥${item.price.toLocaleString()}` : `¥${item.price.toLocaleString()}`;
      const sizeSection = document.getElementById('popup-size-section');
      const sizeRow = document.getElementById('popup-size-row');
      if (sizes.length > 0) {
        sizeSection.style.display = '';
        sizeRow.innerHTML = sizes.map((s, i) => {
          const price = item.price + s.priceDiff;
          const diffLabel = s.priceDiff > 0 ? `+¥${s.priceDiff}` : s.priceDiff < 0 ? `-¥${Math.abs(s.priceDiff)}` : '';
          return `<button class="popup-option-btn${i===0?' selected':''}" data-size-idx="${i}">
            <span class="opt-label">${s.label}</span>
            <span class="opt-price">¥${price.toLocaleString()}</span>
          </button>`;
        }).join('');
      } else { sizeSection.style.display = 'none'; }
      const tempSection = document.getElementById('popup-temp-section');
      const tempRow = document.getElementById('popup-temp-row');
      if (temps.length > 0) {
        tempSection.style.display = '';
        tempRow.innerHTML = temps.map((t, i) => {
          const icon = t === 'HOT' ? '☕ HOT' : '❄️ ICE';
          const cls = t === 'HOT' ? 'hot' : 'ice';
          return `<button class="popup-option-btn ${cls}${i===0?' selected':''}" data-temp="${t}">${icon}</button>`;
        }).join('');
      } else { tempSection.style.display = 'none'; }
      updatePopupTotal();
      document.getElementById('drink-popup-overlay').classList.add('show');
      attachPopupEvents();
    }

    function updatePopupTotal() {
      const item = menu.find(m => m.id === popupItemId);
      if (!item) return;
      const sizes = item.sizes || [];
      const diff = (sizes.length > 0 && popupSelectedSize !== null) ? sizes[popupSelectedSize].priceDiff : 0;
      const total = item.price + diff;
      const c = getCustomer(selectedId);
      document.getElementById('popup-total-price').textContent = `¥${total.toLocaleString()}`;
      const orderBtn = document.getElementById('popup-order-btn');
      if (orderBtn) { orderBtn.disabled = total > c.balance; orderBtn.style.opacity = total <= c.balance ? '1' : '0.4'; }
    }

    function attachPopupEvents() {
      document.querySelectorAll('[data-size-idx]').forEach(btn => {
        btn.onclick = () => {
          popupSelectedSize = parseInt(btn.dataset.sizeIdx);
          document.querySelectorAll('[data-size-idx]').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          updatePopupTotal();
        };
      });
      document.querySelectorAll('[data-temp]').forEach(btn => {
        btn.onclick = () => {
          popupSelectedTemp = btn.dataset.temp;
          document.querySelectorAll('[data-temp]').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
        };
      });
      document.getElementById('popup-cancel-btn').onclick = closeDrinkPopup;
      document.getElementById('drink-popup-overlay').onclick = (e) => { if (e.target === e.currentTarget) closeDrinkPopup(); };
      document.getElementById('popup-order-btn').onclick = () => {
        const item = menu.find(m => m.id === popupItemId);
        const c = getCustomer(selectedId);
        if (!item || !c) return;
        const sizes = item.sizes || [];
        const diff = (sizes.length > 0 && popupSelectedSize !== null) ? sizes[popupSelectedSize].priceDiff : 0;
        const finalPrice = item.price + diff;
        if (finalPrice > c.balance) return;
        const sizeParts = sizes.length > 0 && popupSelectedSize !== null ? sizes[popupSelectedSize].label : '';
        const tempPart = popupSelectedTemp ? (popupSelectedTemp === 'HOT' ? 'HOT' : 'ICE') : '';
        const suffix = [sizeParts, tempPart].filter(Boolean).join(' / ');
        const orderName = suffix ? `${item.name}（${suffix}）` : item.name;
        c.balance -= finalPrice;
        c.orders.push({ name: orderName, price: finalPrice });
        saveData(); closeDrinkPopup(); render();
      };
    }

    function closeDrinkPopup() {
      document.getElementById('drink-popup-overlay').classList.remove('show');
      popupItemId = null;
    }

    function openTicketManage(id) {
      manageTicketsId = id;
      renderTicketManage();
      document.getElementById('ticket-manage-overlay').classList.add('show');
    }

    function closeTicketManage() {
      document.getElementById('ticket-manage-overlay').classList.remove('show');
      manageTicketsId = null;
    }

    function renderTicketManage() {
      const c = getCustomer(manageTicketsId);
      if (!c) return;
      if (!c.ticketNumbers) c.ticketNumbers = [];
      document.getElementById('ticket-manage-name').textContent = `${c.name} 様のチケット№`;
      const nums = c.ticketNumbers.slice().sort((a,b) => a-b);
      const listEl = document.getElementById('ticket-manage-list');
      listEl.innerHTML = nums.length
        ? nums.map(n => `
          <span style="display:inline-flex;align-items:center;gap:6px;background:var(--pop-pink-light);color:var(--pop-pink-dark);border-radius:var(--radius-pill);padding:6px 8px 6px 14px;font-size:14px;font-weight:700;">
            №${n}
            <button data-del-ticket="${n}" style="border:none;background:rgba(0,0,0,0.08);color:inherit;width:20px;height:20px;border-radius:50%;cursor:pointer;font-size:12px;line-height:1;">✕</button>
          </span>`).join('')
        : '<p style="color:var(--text-muted);font-size:13px;">チケット№がありません</p>';
      const startInp = document.getElementById('ticket-renumber-start');
      startInp.value = nums.length ? nums[0] : 1;
      listEl.querySelectorAll('[data-del-ticket]').forEach(btn => {
        btn.onclick = () => {
          const n = parseInt(btn.dataset.delTicket);
          showConfirm(`№${n}を削除しますか？`, '削除する', () => {
            c.ticketNumbers = c.ticketNumbers.filter(x => x !== n);
            c.tickets = c.ticketNumbers.length;
            saveData(); renderTicketManage(); renderCustomerList();
          });
        };
      });
    }

    function attachTicketManageEvents() {
      const closeBtn = document.getElementById('ticket-manage-close-btn');
      if (closeBtn) closeBtn.onclick = closeTicketManage;
      const overlay = document.getElementById('ticket-manage-overlay');
      if (overlay) overlay.onclick = (e) => { if (e.target === e.currentTarget) closeTicketManage(); };
      const renumberBtn = document.getElementById('ticket-renumber-btn');
      if (renumberBtn) renumberBtn.onclick = () => {
        const c = getCustomer(manageTicketsId);
        if (!c) return;
        let start = parseInt(document.getElementById('ticket-renumber-start').value);
        if (isNaN(start) || start < 1) { showToast('正しい開始番号を入力してください'); return; }
        const count = c.ticketNumbers.length;
        c.ticketNumbers = Array.from({ length: count }, (_, i) => start + i);
        saveData(); showToast(`№${start}からの連番に変更しました`); renderTicketManage(); renderCustomerList();
      };
    }

    // ── バックアップ機能 ──────────────────────────
    // 現在の全データ（customers, menu, nextId, nextMenuId）をJSONファイルとして書き出す。
    function exportBackup() {
      const data = {
        customers: customers.map(c => ({ ...c, editing: false })),
        menu, nextId, nextMenuId,
        exportedAt: nowStr()
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const d = new Date();
      const fname = `drink-ticket-backup_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}_${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}.json`;
      const a = document.createElement('a');
      a.href = url; a.download = fname;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
      lastBackupAt = nowStr();
      try { localStorage.setItem(STORAGE_KEY + '-last-backup', lastBackupAt); } catch(e) {}
      showToast('📤 バックアップを書き出しました');
      render();
    }

    // 選択されたJSONバックアップファイルを読み込み、確認の上で現在のデータを上書き復元する。
    function importBackupFile(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        let data;
        try { data = JSON.parse(e.target.result); }
        catch (err) { showToast('⚠️ ファイルの読み込みに失敗しました'); return; }
        if (!data || !Array.isArray(data.customers)) { showToast('⚠️ バックアップファイルの形式が正しくありません'); return; }
        showConfirm('バックアップから復元しますか？\n現在のデータは上書きされます。', '復元する', () => {
          customers = data.customers.map(c => ({
            ticketNumbers: Array.from({ length: c.tickets || 1 }, (_, i) => i + 1),
            ...c
          }));
          if (Array.isArray(data.menu)) menu = data.menu.map(m => ({ sizes: [], temps: [], ...m }));
          if (data.nextId) nextId = data.nextId;
          if (data.nextMenuId) nextMenuId = data.nextMenuId;
          saveData();
          showToast('📥 バックアップから復元しました');
          render();
        });
      };
      reader.readAsText(file);
    }

    function updateMenuPrice(id, newPrice) {
      const price = parseInt(newPrice);
      if (isNaN(price) || price < 0) { showToast('正しい金額を入力してください'); render(); return; }
      if (price % 50 !== 0) { showToast('⚠️ 金額は50円単位で入力してください'); render(); return; }
      const item = menu.find(m => m.id === id);
      if (item) { item.price = price; saveData(); showToast(`${item.name}の価格を¥${price}に変更しました`); }
    }

    function moveMenu(index, direction) {
      const targetIndex = index + direction;
      if (targetIndex < 0 || targetIndex >= menu.length) return;
      const temp = menu[index]; menu[index] = menu[targetIndex]; menu[targetIndex] = temp;
      saveData(); render();
    }

    function render() {
      document.getElementById('app').innerHTML = view === 'order' ? renderOrderView() : renderListView();
      attachEvents();
    }

    function renderListView() {
      // ── 履歴タブ用：全顧客の来店履歴を取得し、日付で絞り込む ──
      const allSessions = getAllSessions();
      const filteredSessions = filterSessionsByDate(allSessions, historyFrom, historyTo);
      const historyTotal = filteredSessions.reduce((s, x) => s + x.total, 0);
      const historySummaryText = `${filteredSessions.length}件 / 合計 ¥${historyTotal.toLocaleString()}`;
      const historyListHTML = filteredSessions.length
        ? filteredSessions.map(s => `
            <div class="history-session">
              <p class="history-date">📅 ${s.date}　<span style="color:var(--text-primary);font-weight:700;">${s.customerName}</span> 様</p>
              <p class="history-items">${s.items.map(i => `${i.name}×${i.count}`).join('、')}</p>
              <p class="history-total">合計 ¥${s.total.toLocaleString()}</p>
            </div>`).join('')
        : `<p style="color:var(--text-muted);text-align:center;padding:1rem 0;">${(historyFrom || historyTo) ? '該当する来店履歴がありません' : 'まだ来店履歴がありません'}</p>`;

      const lastBackupText = lastBackupAt ? `最終バックアップ：${lastBackupAt}` : '';

      const menuRows = menu.map((m, index) => {
        const opts = [];
        if ((m.sizes || []).length > 0) opts.push('S/L');
        if ((m.temps || []).length > 0) opts.push('HOT/ICE');
        const optText = opts.length ? `<br><span style="font-size:11px;color:var(--text-muted);font-weight:500;">↳ ${opts.join('＋')}</span>` : '';
        return `<div class="menu-item-row" style="align-items:flex-start;">
          <div class="menu-sort-actions" style="margin-top:2px;">
            <button class="btn-sort" onclick="moveMenu(${index},-1)" ${index===0?'disabled':''}>▲</button>
            <button class="btn-sort" onclick="moveMenu(${index},1)" ${index===menu.length-1?'disabled':''}>▼</button>
          </div>
          <span class="menu-item-name" style="margin-left:4px;padding-top:6px;">${m.name}${optText}</span>
          <div class="menu-price-edit-wrap" style="margin-top:2px;">
            <input class="menu-price-edit-input" type="number" value="${m.price}" min="0" step="50" onchange="updateMenuPrice(${m.id},this.value)">
            <span class="menu-price-edit-unit">円</span>
          </div>
          <button class="btn-menu-delete" data-menu-delete="${m.id}" style="margin-top:2px;">🗑</button>
        </div>`;
      }).join('');

      return `
        <div class="tabs">
          <button class="tab ${tab==='list'?'active':''}" data-tab="list">👥 一覧</button>
          <button class="tab ${tab==='history'?'active':''}" data-tab="history">🕘 履歴</button>
          <button class="tab ${tab==='add'?'active':''}" data-tab="add">➕ 追加</button>
          <button class="tab ${tab==='menu'?'active':''}" data-tab="menu">🍹 メニュー</button>
          <button class="tab ${tab==='settings'?'active':''}" data-tab="settings">⚙️</button>
        </div>
        ${tab === 'list' ? `
          <div class="search-screen">
            <div class="search-wrap">
              <input class="search-input" id="search-input" placeholder="名前で検索…" value="${searchQuery}" inputmode="text" lang="ja" autocomplete="off" />
              <button class="search-btn" id="search-btn">検索</button>
              ${searchDone ? `<button class="search-clear" id="search-clear">✕</button>` : ''}
            </div>
            <div id="customer-list-container"></div>
          </div>
        ` : tab === 'history' ? `
          <div class="card">
            <p class="section-title">来店履歴を日付で絞り込み</p>
            <div class="search-wrap">
              <input type="date" class="search-input" id="history-from" value="${historyFrom}" />
              <input type="date" class="search-input" id="history-to" value="${historyTo}" />
            </div>
            <div class="search-wrap">
              <button class="search-btn" id="history-search-btn" style="flex:1;">🔍 絞り込む</button>
              ${(historyFrom || historyTo) ? `<button class="search-clear" id="history-clear-btn">✕ クリア</button>` : ''}
            </div>
          </div>
          <div class="card">
            <p class="section-title">${(historyFrom || historyTo) ? '絞り込み結果' : '全履歴（新しい順）'}　${historySummaryText}</p>
            ${historyListHTML}
          </div>
        ` : tab === 'add' ? `
          <div class="card">
            <p class="section-title">新しいお客様を追加（残高1200円でスタート）</p>
            <div class="add-form">
              <input type="text" id="new-name" placeholder="お名前を入力" maxlength="20" inputmode="text" lang="ja" autocomplete="off" />
              <label class="section-title" style="margin:4px 0 -4px;text-transform:none;letter-spacing:normal;">開始チケット№</label>
              <input type="number" id="new-start-ticket" placeholder="開始チケット№（初期値：1）" min="1" value="1" />
              <button class="btn-add" id="add-btn">✨ 追加する</button>
            </div>
          </div>
        ` : tab === 'menu' ? `
          <div class="menu-manage-layout">
            <div class="card">
              <p class="section-title">現在のメニュー（${menu.length}品） ※▲▼で並び替え、価格は直接編集</p>
              ${menu.length ? menuRows : '<p style="color:var(--text-muted);font-size:14px;text-align:center;padding:8px 0;">メニューがありません</p>'}
            </div>
            <div class="card">
              <p class="section-title">✨ 新しいメニューを追加</p>
              <div class="menu-add-form">
                <div class="menu-add-inputs">
                  <input class="inp-name" type="text" id="menu-name" placeholder="品名（例：コーヒー）" maxlength="15" inputmode="text" lang="ja" autocomplete="off" />
                  <input class="inp-price" type="number" id="menu-price" placeholder="金額" min="0" max="9999" step="50" />
                </div>
                <div class="menu-add-options">
                  <label><input type="checkbox" id="chk-size" /> サイズ選択 (S/L)</label>
                  <label><input type="checkbox" id="chk-temp" /> 温度選択 (HOT/ICE)</label>
                </div>
                <button class="btn-menu-add" id="menu-add-btn">➕ メニューに登録する</button>
              </div>
            </div>
          </div>
        ` : `
          <div class="card">
            <p class="section-title">バックアップ</p>
            <p style="font-size:13px;color:var(--text-secondary);margin:0 0 12px;">万が一データが消えても復元できるよう、定期的なバックアップをおすすめします。</p>
            <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1.5px dashed var(--border);">
              <div>
                <p style="font-size:14px;font-weight:600;color:var(--text-primary);margin:0 0 2px;">バックアップを書き出す</p>
                <p style="font-size:12px;color:var(--text-muted);margin:0;">現在の全データをファイルとして保存</p>
              </div>
              <button class="btn btn-ticket" id="backup-export-btn" style="white-space:nowrap;">📤 書き出す</button>
            </div>
            <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;">
              <div>
                <p style="font-size:14px;font-weight:600;color:var(--text-primary);margin:0 0 2px;">バックアップから復元</p>
                <p style="font-size:12px;color:var(--text-muted);margin:0;">書き出したファイルを選択して上書き復元</p>
              </div>
              <button class="btn btn-ticket" id="backup-import-btn" style="white-space:nowrap;">📥 復元する</button>
              <input type="file" id="backup-import-input" accept="application/json" style="display:none;" />
            </div>
            ${lastBackupText ? `<p style="font-size:11px;color:var(--text-muted);margin:10px 0 0;text-align:center;">${lastBackupText}</p>` : ''}
          </div>
          <div class="card">
            <p class="section-title">データ管理</p>
            <p style="font-size:13px;color:var(--text-secondary);margin:0 0 12px;">データはこのブラウザに自動保存されます。</p>
            <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1.5px dashed var(--border);">
              <div>
                <p style="font-size:14px;font-weight:600;color:var(--text-primary);margin:0 0 2px;">お客様データを全てリセット</p>
                <p style="font-size:12px;color:var(--text-muted);margin:0;">全員の残高・注文・来店履歴を初期状態に戻す</p>
              </div>
              <button class="btn btn-delete" id="reset-all-customers-btn" style="white-space:nowrap;">全リセット</button>
            </div>
            <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;">
              <div>
                <p style="font-size:14px;font-weight:600;color:var(--text-primary);margin:0 0 2px;">保存データを完全削除</p>
                <p style="font-size:12px;color:var(--text-muted);margin:0;">ストレージを消去してアプリを初期状態に戻す</p>
              </div>
              <button class="btn btn-delete" id="clear-storage-btn" style="white-space:nowrap;">完全削除</button>
            </div>
          </div>
        `}
      `;
    }

    function renderOrderView() {
      const c = getCustomer(selectedId);
      if (!c) return '';
      const low = c.balance < 400;
      const pct = Math.min(100, Math.round((c.balance / (c.tickets * 1200)) * 100));
      const drinkCards = menu.map(item => {
        const cntAll = c.orders.filter(o => o.name === item.name || o.name.startsWith(item.name + '（')).length;
        const dis = item.price > c.balance;
        const hasSizes = (item.sizes || []).length > 0;
        const hasTemps = (item.temps || []).length > 0;
        const optBadge = (hasSizes || hasTemps) ? `<span style="display:inline-block;font-size:10px;color:var(--text-muted);margin-top:2px;font-weight:500;">${[hasSizes?'S/L':'',hasTemps?'HOT/ICE':''].filter(Boolean).join(' · ')}</span>` : '';
        return `<div class="drink-card${dis?' disabled':''}" data-drink="${item.id}">
          <p class="drink-name">${item.name}</p>
          <p class="drink-price">¥${item.price}${hasSizes?'〜':''}</p>
          ${optBadge}
          <span class="drink-count" style="margin-top:6px;">${cntAll > 0 ? cntAll+'杯' : '　'}</span>
        </div>`;
      }).join('');

      const grouped = {};
      c.orders.forEach(o => {
        const key = `${o.name}__${o.price}`;
        if (!grouped[key]) grouped[key] = { name: o.name, price: o.price, count: 0 };
        grouped[key].count++;
      });
      const currentRows = Object.values(grouped).map(d =>
        `<div class="order-row"><span>${d.name} × ${d.count}</span><span>¥${(d.price*d.count).toLocaleString()}</span></div>`
      ).join('');
      const currentTotal = c.orders.reduce((s, o) => s + o.price, 0);

      // 早朝5時リセット：本日の営業日に属する来店履歴のみ表示する（残高には影響なし）。
      // timestampを持たない旧データ（保存形式の互換性のため）は従来通りすべて表示する。
      const visibleSessions = c.sessions.filter(s => !s.timestamp || getBusinessDateKey(s.timestamp) === CURRENT_BUSINESS_DATE);
      const hiddenCount = c.sessions.length - visibleSessions.length;
      const sessionHistory = visibleSessions.length
        ? visibleSessions.slice().reverse().map(s => `
            <div class="history-session">
              <p class="history-date">📅 ${s.date}</p>
              <p class="history-items">${s.items.map(i => `${i.name}×${i.count}`).join('、')}</p>
              <p class="history-total">合計 ¥${s.total.toLocaleString()}</p>
            </div>`).join('')
        : '<p style="color:var(--text-muted);font-size:13px;text-align:center;padding:6px 0;">来店履歴はありません</p>';
      const hiddenNote = hiddenCount > 0
        ? `<p style="color:var(--text-muted);font-size:11px;text-align:center;margin:4px 0 0;">※前営業日以前の履歴 ${hiddenCount} 件は非表示（早朝5時で切替）</p>`
        : '';

      const ticketBadge = c.tickets > 1 ? `<span class="tickets-badge">${c.tickets}枚所持</span>` : '';

      // PC用サイドバー：全顧客の名前一覧（現在選択中をハイライト）
      const sidebarItems = customers.map(cu =>
        `<div class="pc-sidebar-item${cu.id === c.id ? ' active' : ''}" data-order="${cu.id}">
          ${cu.name}
          <span style="float:right;font-size:11px;color:var(--text-muted);">¥${cu.balance.toLocaleString()}</span>
        </div>`
      ).join('');

      return `
        <div class="pc-order-layout">
          <div class="pc-sidebar">
            <button class="back-btn" id="back-btn" style="width:100%;margin-bottom:12px;justify-content:center;">← 一覧に戻る</button>
            <p class="pc-sidebar-title">顧客一覧</p>
            <div class="pc-sidebar-list">${sidebarItems}</div>
          </div>
          <div class="pc-main">
            <div class="card">
              <p style="font-size:11px;color:var(--text-muted);margin:0 0 2px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;">注文中</p>
              <p style="font-size:20px;font-weight:700;color:var(--text-primary);margin:0 0 12px;">${c.name} 様 ${ticketBadge}</p>
              <div class="balance-bar">
                <span class="bal-big${low?' low':''}">残 ¥${c.balance.toLocaleString()}</span>
                <div class="prog-bg"><div class="prog-fill${low?' low':''}" style="width:${pct}%"></div></div>
                <span style="font-size:12px;color:var(--text-muted);font-weight:600;">${pct}%</span>
              </div>
              <div class="alert" id="alert-msg"></div>
              <p class="section-title">メニュー（クリックで注文）</p>
              <div class="drink-grid">${drinkCards || '<p style="color:var(--text-muted);">メニューがありません</p>'}</div>
            </div>
            <div class="card">
              <p class="section-title">今回の注文</p>
              ${c.orders.length === 0 ? '<p style="color:var(--text-muted);font-size:14px;text-align:center;padding:8px 0;">まだ注文がありません</p>' : `${currentRows}
                   <div style="display:flex;justify-content:space-between;font-size:15px;font-weight:700;padding-top:10px;color:var(--text-primary);">
                     <span>合計</span><span>¥${currentTotal.toLocaleString()}</span>
                   </div>
                   <div style="display:flex;gap:10px;margin-top:12px;justify-content:flex-end;flex-wrap:wrap;">
                     <button class="undo-btn" id="undo-btn">↩ 最後を取り消す</button>
                     <button class="undo-btn" id="reset-orders-btn" style="color:var(--pop-orange);">🔄 全リセット</button>
                     <button class="undo-btn" id="save-session-btn" style="color:var(--pop-pink-dark);">✅ 来店確定</button>
                   </div>`}
            </div>
            <div class="card">
              <p class="section-title">来店履歴（本日分）</p>
              ${sessionHistory}
              ${hiddenNote}
            </div>
          </div>
        </div>
      `;
    }

    function attachCustomerEvents() {
      document.querySelectorAll('[data-order]').forEach(el => {
        el.onclick = () => { selectedId = parseInt(el.dataset.order); view = 'order'; render(); };
      });
      document.querySelectorAll('[data-addticket]').forEach(el => {
        el.onclick = () => {
          const c = getCustomer(parseInt(el.dataset.addticket));
          if (!c.ticketNumbers) c.ticketNumbers = [];
          const newNum = c.ticketNumbers.length ? Math.max(...c.ticketNumbers) + 1 : 1;
          c.ticketNumbers.push(newNum);
          c.balance += 1200; c.tickets += 1;
          saveData(); showToast(`${c.name} さんに№${newNum}を追加しました`); renderCustomerList();
        };
      });
      document.querySelectorAll('[data-manage-tickets]').forEach(el => {
        el.onclick = () => { openTicketManage(parseInt(el.dataset.manageTickets)); };
      });
      document.querySelectorAll('[data-edit]').forEach(el => {
        el.onclick = () => {
          customers.forEach(x => { x.editing = false; });
          getCustomer(parseInt(el.dataset.edit)).editing = true;
          renderCustomerList();
        };
      });
      document.querySelectorAll('[data-save]').forEach(el => {
        el.onclick = () => {
          const c = getCustomer(parseInt(el.dataset.save));
          const sel = document.querySelector(`.edit-bal-select[data-id="${el.dataset.save}"]`);
          c.balance = parseInt(sel.value); c.editing = false;
          saveData(); renderCustomerList();
        };
      });
      document.querySelectorAll('[data-reset]').forEach(el => {
        el.onclick = () => {
          const c = getCustomer(parseInt(el.dataset.reset));
          showConfirm(`「${c.name}」さんの注文・残高・枚数を\n初期状態に戻しますか？`, '全リセットする', () => {
            c.orders = []; c.balance = 1200; c.tickets = 1; c.ticketNumbers = [1];
            saveData(); showToast(`${c.name} さんをリセットしました`); renderCustomerList();
          });
        };
      });
      document.querySelectorAll('[data-delete]').forEach(el => {
        el.onclick = () => {
          const c = getCustomer(parseInt(el.dataset.delete));
          showConfirm(`「${c.name}」さんを削除しますか？`, '削除する', () => {
            customers = customers.filter(x => x.id !== c.id);
            saveData(); showToast(`${c.name} さんを削除しました`); renderCustomerList();
          });
        };
      });
    }

    function attachEvents() {
      document.querySelectorAll('[data-tab]').forEach(el => {
        el.onclick = () => { tab = el.dataset.tab; render(); };
      });
      const si = document.getElementById('search-input');
      const sb = document.getElementById('search-btn');
      const sc = document.getElementById('search-clear');
      if (si && sb) {
        sb.onclick = () => { searchQuery = si.value; searchDone = true; renderCustomerList(); };
        si.onkeydown = e => { if (e.key === 'Enter') { searchQuery = si.value; searchDone = true; renderCustomerList(); } };
      }
      if (sc) sc.onclick = () => { searchQuery = ''; searchDone = false; render(); };
      if (tab === 'list') renderCustomerList();

      // 履歴タブ：日付絞り込み・クリア
      const hsBtn = document.getElementById('history-search-btn');
      const hcBtn = document.getElementById('history-clear-btn');
      if (hsBtn) hsBtn.onclick = () => {
        historyFrom = document.getElementById('history-from').value;
        historyTo = document.getElementById('history-to').value;
        render();
      };
      if (hcBtn) hcBtn.onclick = () => { historyFrom = ''; historyTo = ''; render(); };

      const addBtn = document.getElementById('add-btn');
      if (addBtn) addBtn.onclick = () => {
        const inp = document.getElementById('new-name');
        const name = inp.value.trim();
        if (!name) { inp.focus(); return; }
        const startInp = document.getElementById('new-start-ticket');
        let startNum = parseInt(startInp.value);
        if (isNaN(startNum) || startNum < 1) startNum = 1;
        customers.push({ id: nextId++, name, balance: 1200, tickets: 1, ticketNumbers: [startNum], orders: [], sessions: [], editing: false });
        inp.value = ''; startInp.value = '1'; tab = 'list'; searchQuery = ''; searchDone = false;
        saveData(); showToast(`${name} さんを追加しました（№${startNum}）`); render();
      };

      const menuAddBtn = document.getElementById('menu-add-btn');
      if (menuAddBtn) menuAddBtn.onclick = () => {
        const name = document.getElementById('menu-name').value.trim();
        const price = parseInt(document.getElementById('menu-price').value);
        if (!name || isNaN(price) || price < 0) { showToast('品名と金額を入力してください'); return; }
        if (price % 50 !== 0) { showToast('⚠️ 金額は50円単位で入力してください'); return; }
        const chkSize = document.getElementById('chk-size').checked;
        const chkTemp = document.getElementById('chk-temp').checked;
        const sizes = chkSize ? [{label:'S',priceDiff:0},{label:'L',priceDiff:100}] : [];
        const temps = chkTemp ? ['HOT','ICE'] : [];
        menu.push({ id: nextMenuId++, name, price, sizes, temps });
        saveData(); showToast(`${name}（¥${price}）を追加しました`); render();
      };

      document.querySelectorAll('[data-menu-delete]').forEach(el => {
        el.onclick = () => {
          const m = menu.find(x => x.id === parseInt(el.dataset.menuDelete));
          showConfirm(`「${m.name}」を削除しますか？`, '削除する', () => {
            menu = menu.filter(x => x.id !== m.id);
            saveData(); showToast(`${m.name} を削除しました`); render();
          });
        };
      });

      const back = document.getElementById('back-btn');
      if (back) back.onclick = () => { view = 'list'; render(); };

      document.querySelectorAll('[data-drink]').forEach(el => {
        el.onclick = () => {
          const item = menu.find(m => m.id === parseInt(el.dataset.drink));
          if (!item) return;
          const c = getCustomer(selectedId);
          if ((item.sizes || []).length > 0 || (item.temps || []).length > 0) { openDrinkPopup(item.id); return; }
          if (item.price > c.balance) {
            const alertEl = document.getElementById('alert-msg');
            alertEl.style.display = 'block'; alertEl.textContent = '残高不足';
            setTimeout(() => { alertEl.style.display = 'none'; }, 2500);
            return;
          }
          c.balance -= item.price;
          c.orders.push({ name: item.name, price: item.price });
          saveData(); render();
        };
      });

      const undo = document.getElementById('undo-btn');
      if (undo) undo.onclick = () => {
        const c = getCustomer(selectedId);
        if (!c.orders.length) return;
        const last = c.orders.pop(); c.balance += last.price;
        saveData(); render();
      };

      const resetOrders = document.getElementById('reset-orders-btn');
      if (resetOrders) resetOrders.onclick = () => {
        const c = getCustomer(selectedId);
        showConfirm('今回の注文を全リセットしますか？', '全て取り消す', () => {
          c.balance += c.orders.reduce((s, o) => s + o.price, 0);
          c.orders = []; saveData(); render();
        });
      };

      const saveSession = document.getElementById('save-session-btn');
      if (saveSession) saveSession.onclick = () => {
        const c = getCustomer(selectedId);
        if (!c.orders.length) return;
        const grouped = {};
        c.orders.forEach(o => {
          const key = `${o.name}__${o.price}`;
          if (!grouped[key]) grouped[key] = { name: o.name, price: o.price, count: 0 };
          grouped[key].count++;
        });
        const total = c.orders.reduce((s, o) => s + o.price, 0);
        c.sessions.push({ date: nowStr(), timestamp: Date.now(), items: Object.values(grouped), total });
        c.orders = []; saveData(); showToast('来店を確定しました'); render();
      };

      document.getElementById('confirm-cancel').onclick = () => {
        document.getElementById('confirm-overlay').classList.remove('show'); confirmCallback = null;
      };
      document.getElementById('confirm-ok').onclick = () => {
        document.getElementById('confirm-overlay').classList.remove('show');
        if (confirmCallback) { confirmCallback(); confirmCallback = null; }
      };

      const resetAllBtn = document.getElementById('reset-all-customers-btn');
      if (resetAllBtn) resetAllBtn.onclick = () => {
        showConfirm('全員をリセットしますか？', 'リセット', () => {
          customers.forEach(c => { c.balance = 1200; c.tickets = 1; c.ticketNumbers = [1]; c.orders = []; c.sessions = []; c.editing = false; });
          saveData(); render();
        });
      };

      // バックアップ：書き出し・復元
      const exportBtn = document.getElementById('backup-export-btn');
      if (exportBtn) exportBtn.onclick = exportBackup;
      const importBtn = document.getElementById('backup-import-btn');
      const importInput = document.getElementById('backup-import-input');
      if (importBtn && importInput) {
        importBtn.onclick = () => importInput.click();
        importInput.onchange = () => {
          const file = importInput.files[0];
          if (file) importBackupFile(file);
          importInput.value = '';
        };
      }

      const clearStorageBtn = document.getElementById('clear-storage-btn');
      if (clearStorageBtn) clearStorageBtn.onclick = () => {
        showConfirm('データを全消去しますか？', '消去する', () => {
          localStorage.removeItem(STORAGE_KEY); location.reload();
        });
      };
    }
    render();
    attachTicketManageEvents();
  </script>
</body>
</html>
