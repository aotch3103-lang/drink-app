<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ドラパン 総合売上管理</title>
  <!-- 画面表示（CSS）はすべて style.css に分離してあります -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <div class="app-header">
      <div class="app-header-title">
        <svg class="app-header-icon" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M10 14 C8 6, 12 2, 14 4 C16 7, 15 13, 14 16 Z" fill="#FF6B9D"/>
          <path d="M22 14 C24 6, 20 2, 18 4 C16 7, 17 13, 18 16 Z" fill="#FF6B9D"/>
          <path d="M11 13 C10 8, 12.5 4.5, 13.5 5.5 C14.5 7.5, 14 12, 13.3 14 Z" fill="#FFE0EE"/>
          <path d="M21 13 C22 8, 19.5 4.5, 18.5 5.5 C17.5 7.5, 18 12, 18.7 14 Z" fill="#FFE0EE"/>
          <circle cx="16" cy="21" r="9" fill="#FFFDF8" stroke="#FF6B9D" stroke-width="1.4"/>
          <circle cx="10.5" cy="23" r="1.6" fill="#FFC1DA"/>
          <circle cx="21.5" cy="23" r="1.6" fill="#FFC1DA"/>
          <circle cx="12.8" cy="20" r="1.3" fill="#1a1a2e"/>
          <circle cx="19.2" cy="20" r="1.3" fill="#1a1a2e"/>
          <path d="M16 22.3 L14.8 24 L17.2 24 Z" fill="#FF6B9D"/>
        </svg>
        <span>ドラパン</span>
        <svg class="app-header-icon" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <ellipse cx="16" cy="29" rx="10" ry="1.6" fill="#F0A0C8" opacity="0.35"/>
          <rect x="4" y="4" width="24" height="24" rx="7" fill="#FFFDF8" stroke="#FF6B9D" stroke-width="1.4"/>
          <rect x="4" y="4" width="24" height="9" rx="7" fill="#FFE0EE" opacity="0.75"/>
          <text x="16" y="23" font-family="'Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif" font-size="14" font-weight="700" fill="#E5484D" text-anchor="middle">中</text>
          <circle cx="24.5" cy="8.5" r="1.3" fill="#FFFFFF" opacity="0.9"/>
          <circle cx="26.6" cy="11" r="0.8" fill="#FFFFFF" opacity="0.7"/>
        </svg>
        <span>総合売上管理</span>
      </div>
    </div>
    <div id="app"></div>
    <div class="confirm-overlay" id="confirm-overlay">
      <div class="confirm-box">
        <p id="confirm-msg"></p>
        <div class="confirm-actions">
          <button class="confirm-ok" id="confirm-ok">実行する</button>
          <button class="confirm-cancel" id="confirm-cancel">キャンセル</button>
        </div>
      </div>
    </div>
    <div class="toast" id="toast"></div>

    <div class="drink-popup-overlay" id="drink-popup-overlay">
      <div class="drink-popup">
        <p class="drink-popup-title" id="popup-drink-name"></p>
        <p class="drink-popup-base-price" id="popup-drink-base-price"></p>
        <div id="popup-size-section">
          <p class="popup-section-label">サイズ</p>
          <div class="popup-option-row" id="popup-size-row"></div>
        </div>
        <div id="popup-temp-section">
          <p class="popup-section-label">温度</p>
          <div class="popup-option-row" id="popup-temp-row"></div>
        </div>
        <p class="popup-total-price" id="popup-total-price"></p>
        <div class="popup-actions">
          <button class="popup-cancel-btn" id="popup-cancel-btn">キャンセル</button>
          <button class="popup-order-btn" id="popup-order-btn">注文する</button>
        </div>
      </div>
    </div>

    <div class="drink-popup-overlay" id="ticket-manage-overlay">
      <div class="drink-popup">
        <p class="drink-popup-title" id="ticket-manage-name"></p>
        <p class="drink-popup-base-price">所持しているチケット№の確認・削除・開始番号の変更ができます</p>
        <div id="ticket-manage-list" style="display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 18px;"></div>
        <p class="popup-section-label">開始番号を変更してリナンバー</p>
        <div class="popup-option-row" style="align-items:center;">
          <input type="number" id="ticket-renumber-start" min="1" value="1" style="flex:1;height:44px;border:1.5px solid var(--border);border-radius:var(--radius-pill);padding:0 14px;font-size:16px;background:var(--surface-1);color:var(--text-primary);outline:none;" />
          <button class="popup-order-btn" id="ticket-renumber-btn" style="flex:1;">適用</button>
        </div>
        <div class="popup-actions">
          <button class="popup-cancel-btn" id="ticket-manage-close-btn">閉じる</button>
        </div>
      </div>
    </div>
  </div>

  <!--
    読み込み順が重要です。
    1) reset.js … 「売上リセット機能」（先に読み込んでおくことで、
       app.js が最初の画面を描画する際にリセット系ボタンの配線関数
       attachResetEvents() が既に使える状態になります）
    2) app.js   … 「計算・ロジック」＋ 画面の組み立て・初期描画
  -->
  <script src="reset.js"></script>
  <script src="app.js"></script>
</body>
</html>
